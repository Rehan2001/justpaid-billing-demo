<!DOCTYPE html>

<html>
<head>
  <title>Invoice Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f4f4f4; }
    .overdue { color: red; }
    .paid { color: green; }
  </style>
</head>

<body>

<h2>Invoice Upload</h2>

<input type="file" id="f">
<button onclick="u()">Upload</button>

<h3>Summary</h3>
<div id="summary"></div>

<table>
  <thead>
    <tr>
      <th>Customer</th>
      <th>Amount</th>
      <th>Due Date</th>
      <th>Status</th>
      <th>Days Overdue</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
async function u(){
  let file=document.getElementById('f').files[0];
  let fd=new FormData();
  fd.append('file',file);

  let r=await fetch('/api/upload',{method:'POST',body:fd});
  let d=await r.json();

  renderSummary(d.summary);
  renderTable(d.invoices);
}

function renderSummary(s){
  document.getElementById('summary').innerHTML =
    `Total: $${s.total} | Overdue: $${s.overdue} | Paid: $${s.paid} | Count: ${s.count}`;
}

function renderTable(data){
  let html='';
  data.forEach(i=>{
    html += `
      <tr>
        <td>${i.customer}</td>
        <td>$${i.amount}</td>
        <td>${i.due_date}</td>
        <td class="${i.status.toLowerCase()}">${i.status}</td>
        <td>${i.days_overdue}</td>
      </tr>`;
  });
  document.getElementById('table').innerHTML = html;
}
</script>

</body>
</html>
